<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilya | Premium Realistic Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* خلفية متدرجة عميقة لإبراز الظلال والأزهار الواقعية */
            background: radial-gradient(circle at 50% 50%, #1a0510 0%, #0a0005 60%, #000000 100%);
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        #webgl-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        .ui-layer {
            position: relative;
            z-index: 2;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 1100px;
            aspect-ratio: 16 / 9;
            border-radius: 20px;
            overflow: hidden;
            /* ظل واقعي وعميق للفيديو */
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(255, 20, 147, 0.15);
            border: 1px solid rgba(255, 105, 180, 0.2);
            backdrop-filter: blur(10px);
            pointer-events: auto; /* السماح بالضغط */
            opacity: 0;
            transform: scale(0.98);
        }

        .main-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
            /* تسريع ظهور الفيديو ودمجه */
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <div class="ui-layer">
        <div class="video-wrapper">
            <video src="video.mp4" class="main-video" autoplay loop muted playsinline preload="auto"></video>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const canvas = document.getElementById('webgl-canvas');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0005, 0.03);

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 10;

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // 1. تصميم زهرة أكثر واقعية ونعومة (SVG عالي الجودة متدرج)
        const realisticLotusSVG = `
            <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
                <defs>
                    <radialGradient id='petalGrad' cx='50%' cy='80%' r='80%'>
                        <stop offset='0%' stop-color='#ffffff' stop-opacity='0.9'/>
                        <stop offset='40%' stop-color='#ff69b4' stop-opacity='0.8'/>
                        <stop offset='80%' stop-color='#c71585' stop-opacity='0.6'/>
                        <stop offset='100%' stop-color='#000000' stop-opacity='0'/>
                    </radialGradient>
                    <filter id='blur' x='-20%' y='-20%' width='140%' height='140%'>
                        <feGaussianBlur stdDeviation='1.5'/>
                    </filter>
                </defs>
                <g filter='url(#blur)'>
                    <path d='M50,85 C25,70 15,50 15,35 C15,20 30,15 50,50 C70,15 85,20 85,35 C85,50 75,70 50,85 Z' fill='url(#petalGrad)'/>
                    <path d='M50,85 C35,65 25,45 25,30 C25,15 40,15 50,45 C60,15 75,15 75,30 C75,45 65,65 50,85 Z' fill='url(#petalGrad)'/>
                    <path d='M50,85 C42,60 38,40 38,25 C38,15 45,10 50,15 C55,10 62,15 62,25 C62,40 58,60 50,85 Z' fill='#ffffff' opacity='0.7'/>
                </g>
            </svg>
        `;
        const blob = new Blob([realisticLotusSVG], {type: 'image/svg+xml'});
        const lotusUrl = URL.createObjectURL(blob);
        const textureLoader = new THREE.TextureLoader();
        const lotusTexture = textureLoader.load(lotusUrl);

        // إنشاء خامة دائرية ناعمة للذيل (الظل المرئي)
        function createShadowTexture() {
            const canvasObj = document.createElement('canvas');
            canvasObj.width = 64; canvasObj.height = 64;
            const ctx = canvasObj.getContext('2d');
            const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
            grad.addColorStop(0.3, 'rgba(255, 105, 180, 0.6)');
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 64, 64);
            const tex = new THREE.Texture(canvasObj);
            tex.needsUpdate = true;
            return tex;
        }
        const shadowTexture = createShadowTexture();

        // 2. نظام الأزهار الواقعية
        const lotusCount = 150;
        const lotusGeo = new THREE.BufferGeometry();
        const lotusPosArray = new Float32Array(lotusCount * 3);
        const lotusData = []; 

        for(let i = 0; i < lotusCount; i++) {
            lotusPosArray[i*3] = (Math.random() - 0.5) * 40;
            lotusPosArray[i*3+1] = (Math.random() - 0.5) * 20;
            lotusPosArray[i*3+2] = (Math.random() - 0.5) * 15 - 5;

            lotusData.push({
                baseSpeedY: Math.random() * 0.015 + 0.01,
                speedX: (Math.random() - 0.5) * 0.005,
                angle: Math.random() * Math.PI * 2,
                // متغيرات للتفاعل عند الضغط
                forceX: 0,
                forceY: 0
            });
        }

        lotusGeo.setAttribute('position', new THREE.BufferAttribute(lotusPosArray, 3));

        const lotusMaterial = new THREE.PointsMaterial({
            size: 2.2, // حجم واقعي ومتناسق
            map: lotusTexture,
            transparent: true,
            depthWrite: false,
            blending: THREE.NormalBlending // دمج طبيعي للألوان وليس نيون
        });

        const lotusMesh = new THREE.Points(lotusGeo, lotusMaterial);
        scene.add(lotusMesh);

        // 3. نظام الذيل (الظل المرئي المرن)
        const maxTail = 9000;
        let tailIdx = 0;
        const tailGeo = new THREE.BufferGeometry();
        const tailPosArray = new Float32Array(maxTail * 3);
        const tailAgeArray = new Float32Array(maxTail);

        tailGeo.setAttribute('position', new THREE.BufferAttribute(tailPosArray, 3));
        tailGeo.setAttribute('age', new THREE.BufferAttribute(tailAgeArray, 1));

        const tailMaterial = new THREE.ShaderMaterial({
            uniforms: {
                tex: { value: shadowTexture },
                color: { value: new THREE.Color(0x8b0045) } // لون ظل عنّابي/وردي عميق
            },
            vertexShader: `
                attribute float age;
                varying float vAge;
                void main() {
                    vAge = age;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    // الذيل يبدأ بحجم الزهرة ويصغر بانسيابية
                    gl_PointSize = 25.0 * age * (10.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform sampler2D tex;
                uniform vec3 color;
                varying float vAge;
                void main() {
                    if (vAge <= 0.0) discard;
                    vec4 tColor = texture2D(tex, gl_PointCoord);
                    // شفافية ناعمة جداً ليعطي تأثير الظل المتصل
                    gl_FragColor = vec4(color * tColor.rgb, tColor.a * vAge * 0.3);
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const tailMesh = new THREE.Points(tailGeo, tailMaterial);
        scene.add(tailMesh);

        // 4. تفاعل الماوس والضغط (Click Interaction)
        let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX) * 0.001;
            mouseY = (event.clientY - windowHalfY) * 0.001;
        });

        // عند الضغط: إنشاء تأثير حركة انسيابية في الخلفية (Shockwave)
        document.addEventListener('click', () => {
            for(let i = 0; i < lotusCount; i++) {
                // إعطاء قوة دفع عشوائية سلسة للأزهار لتتحرك بسرعة ثم تتباطأ
                lotusData[i].forceX = (Math.random() - 0.5) * 0.15;
                lotusData[i].forceY = (Math.random() - 0.5) * 0.15 + 0.05;
            }
            
            // حركة اهتزاز ناعمة للكاميرا
            gsap.to(camera.position, {
                z: 9.5,
                duration: 0.3,
                yoyo: true,
                repeat: 1,
                ease: "power2.out"
            });
        });

        // 5. محرك الحركة والتصيير
        function animate() {
            requestAnimationFrame(animate);

            // حركة الأزهار والذيل
            for(let i = 0; i < lotusCount; i++) {
                let d = lotusData[i];
                
                // تطبيق قوة الضغط (إن وجدت) وتخفيفها تدريجياً (Friction)
                d.forceX *= 0.92;
                d.forceY *= 0.92;

                // حركة تمايل طبيعية للأزهار
                d.angle += 0.02;
                let wobbleX = Math.sin(d.angle) * 0.01;

                lotusPosArray[i*3] += d.speedX + wobbleX + d.forceX;
                lotusPosArray[i*3+1] += d.baseSpeedY + d.forceY;
                
                // إعادة الزهرة إذا خرجت من الشاشة
                if(lotusPosArray[i*3+1] > 15) {
                    lotusPosArray[i*3+1] = -15;
                    lotusPosArray[i*3] = (Math.random() - 0.5) * 40;
                }

                // رسم الذيل خلف الزهرة مباشرة
                tailPosArray[tailIdx*3] = lotusPosArray[i*3];
                tailPosArray[tailIdx*3+1] = lotusPosArray[i*3+1] - 0.3; // أسفل الزهرة بقليل
                tailPosArray[tailIdx*3+2] = lotusPosArray[i*3+2];
                tailAgeArray[tailIdx] = 1.0; 
                
                tailIdx = (tailIdx + 1) % maxTail;
            }
            lotusGeo.attributes.position.needsUpdate = true;

            // تحديث عمر وحركة الذيل المرن
            for(let i = 0; i < maxTail; i++) {
                if(tailAgeArray[i] > 0) {
                    tailAgeArray[i] -= 0.02; // يتلاشى بنعومة
                    // الذيل يتأرجح قليلاً ليعطي إحساس المرونة والظل المرئي
                    tailPosArray[i*3] += Math.sin(i) * 0.002; 
                }
            }
            tailGeo.attributes.position.needsUpdate = true;
            tailGeo.attributes.age.needsUpdate = true;

            // حركة الكاميرا السلسة جداً مع الماوس
            targetX += (mouseX - targetX) * 0.05;
            targetY += (mouseY - targetY) * 0.05;
            camera.rotation.y += (targetX - camera.rotation.y) * 0.05;
            camera.rotation.x += (targetY - camera.rotation.x) * 0.05;

            renderer.render(scene, camera);
        }
        animate();

        // 6. دخول أنيق جداً للفيديو عند التحميل
        gsap.to(".video-wrapper", {
            duration: 2.5,
            scale: 1,
            opacity: 1,
            ease: "power3.out",
            delay: 0.2
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

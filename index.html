<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيد ميلاد ملاك</title>
<style>
    /* الإعدادات الأساسية لضمان عدم وجود أي تشوه */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body, html {
        width: 100%;
        height: 100%;
        background-color: #000000;
        overflow: hidden; /* يمنع ظهور أي أشرطة تمرير مزعجة */
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* الحاوية الرئيسية للصورة مع تفاعل الحركة */
    #main-container {
        position: absolute;
        width: 110vw; /* حجم أكبر بقليل لضمان مساحة لحركة الـ 3D */
        height: 110vh;
        top: -5vh;
        left: -5vw;
        background-image: url('191.jpg'); /* صورتك الأصلية */
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        
        /* تأثير الدخول السينمائي */
        filter: brightness(0) contrast(1.2) blur(10px);
        animation: revealScene 4s 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        transition: transform 0.1s ease-out; /* نعومة حركة الماوس */
    }

    /* طبقة الظلال لجعل التركيز على المنتصف */
    .vignette {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.8) 120%);
        pointer-events: none;
        z-index: 5;
    }

    /* حاوية جزيئات النيون المتطايرة */
    .particles-container {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 10;
    }

    .particle {
        position: absolute;
        border-radius: 50%;
        opacity: 0;
        animation: floatUp var(--duration) infinite ease-in-out var(--delay);
        mix-blend-mode: screen; /* لدمج الضوء مع الخلفية بشكل واقعي */
    }

    /* التأثير التكنولوجي الخفيف (الشاشات الرقمية) */
    .tech-overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
        background-size: 100% 4px;
        pointer-events: none;
        z-index: 20;
        opacity: 0;
        animation: fadeInOverlay 3s 3s forwards;
    }

    /* --- الحركات (Animations) --- */
    
    /* حركة ظهور العالم */
    @keyframes revealScene {
        0% { filter: brightness(0) blur(20px); transform: scale(1.1); }
        50% { filter: brightness(0.6) blur(5px); }
        100% { filter: brightness(1) blur(0px); transform: scale(1); }
    }

    /* حركة الجزيئات المتطايرة */
    @keyframes floatUp {
        0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
        20% { opacity: 0.8; }
        80% { opacity: 0.5; }
        100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }

    /* ظهور التأثير التكنولوجي */
    @keyframes fadeInOverlay {
        to { opacity: 1; }
    }

</style>
</head>
<body>

    <div id="main-container"></div>
    
    <div class="vignette"></div>
    <div class="tech-overlay"></div>
    <div class="particles-container" id="particles"></div>

    <script>
        // سكربت توليد جزيئات النيون (وردي وأحمر داكن)
        const container = document.getElementById('particles');
        const particleCount = 80; // عدد الجزيئات

        for(let i = 0; i < particleCount; i++) {
            let p = document.createElement('div');
            p.classList.add('particle');
            
            // خصائص عشوائية لكل جزيء ليكون المظهر طبيعياً
            let size = Math.random() * 6 + 2; // الحجم
            let left = Math.random() * 100; // الموقع الأفقي
            let duration = Math.random() * 12 + 6; // سرعة الطيران
            let delay = Math.random() * 5; // وقت البدء

            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = left + '%';
            p.style.setProperty('--duration', duration + 's');
            p.style.setProperty('--delay', delay + 's');
            
            // تنويع الألوان بين الوردي الفاتح النيوني والأحمر الداكن
            if(Math.random() > 0.5) {
                p.style.background = 'radial-gradient(circle, #ff1493 0%, rgba(255, 20, 147, 0) 70%)'; // وردي
                p.style.boxShadow = '0 0 10px #ff1493';
            } else {
                p.style.background = 'radial-gradient(circle, #ff0033 0%, rgba(255, 0, 51, 0) 70%)'; // أحمر
                p.style.boxShadow = '0 0 10px #ff0033';
            }

            container.appendChild(p);
        }

        // سكربت التفاعل مع حركة الماوس لجعل الصورة 3D
        const mainContainer = document.getElementById('main-container');
        
        document.addEventListener('mousemove', (e) => {
            // حساب مكان الماوس بالنسبة لمركز الشاشة
            const x = (e.clientX / window.innerWidth - 0.5) * 20; 
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            
            // تحريك الصورة عكس اتجاه الماوس ببطء
            requestAnimationFrame(() => {
                mainContainer.style.transform = `translate(${-x}px, ${-y}px) scale(1.02)`;
            });
        });

        // دعم الحركة للموبايل عند لمس وتحريك الإصبع على الشاشة
        document.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) {
                const touch = e.touches[0];
                const x = (touch.clientX / window.innerWidth - 0.5) * 15;
                const y = (touch.clientY / window.innerHeight - 0.5) * 15;
                
                requestAnimationFrame(() => {
                    mainContainer.style.transform = `translate(${-x}px, ${-y}px) scale(1.02)`;
                });
            }
        });
    </script>
</body>
</html>

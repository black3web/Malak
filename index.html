<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jalal | Premium Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; 
            background-color: #030000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }
        
        /* طبقة الـ Canvas الحقيقية (WebGL) */
        #webgl-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1; 
        }

        /* طبقة الواجهة الزجاجية */
        .ui-layer {
            position: relative;
            z-index: 2; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* السماح بتمرير الماوس للخلفية */
            padding: 20px;
        }

        /* حاوية الفيديو بتأثير زجاجي (Glassmorphism) */
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 1000px; /* الحجم الأقصى للشاشات الكبيرة */
            aspect-ratio: 16 / 9; /* شكل عريض مثالي */
            border-radius: 24px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(255, 0, 60, 0.25), 
                        inset 0 0 20px rgba(255, 255, 255, 0.05);
            opacity: 0; /* للأنميشن */
            transform: scale(0.95); /* للأنميشن */
            pointer-events: auto; /* تفعيل التفاعل مع الفيديو إن لزم */
        }

        /* تنسيق الفيديو ليملأ الحاوية بدون تشوه */
        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <div class="ui-layer">
        <div class="video-wrapper" id="main-video">
            <video src="video.mp4" autoplay loop muted playsinline></video>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // 1. إعداد بيئة Three.js
        const canvas = document.getElementById('webgl-canvas');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // إعداد المصير (Renderer) مع تفعيل تقنية الذيل/الدخان
        const renderer = new THREE.WebGLRenderer({ 
            canvas: canvas, 
            antialias: true,
            preserveDrawingBuffer: true // ضروري لتأثير الدخان
        });
        
        // إيقاف المسح التلقائي لصنع تأثير الضل المرن (Motion Blur / Smoke Trail)
        renderer.autoClearColor = false;
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // 2. تصميم شكل زهرة اللوتس برمجياً (لضمان عمل الكود فوراً وبدقة عالية)
        // ملاحظة: لواقعية "فوتوغرافية"، يمكنك استبدال هذا التيكستشر بمسار صورة حقيقية (مثال: textureLoader.load('lotus.png'))
        function createLotusTexture() {
            const size = 256;
            const canvas2d = document.createElement('canvas');
            canvas2d.width = size;
            canvas2d.height = size;
            const ctx = canvas2d.getContext('2d');
            
            // التوهج الداخلي
            const gradient = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
            gradient.addColorStop(0, 'rgba(255, 100, 150, 1)');
            gradient.addColorStop(0.2, 'rgba(255, 30, 80, 0.8)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);

            // رسم بتلات اللوتس
            ctx.fillStyle = 'rgba(255, 180, 200, 0.9)';
            ctx.shadowColor = 'rgba(255, 0, 60, 0.8)';
            ctx.shadowBlur = 15;
            for(let i = 0; i < 12; i++) {
                ctx.save();
                ctx.translate(size/2, size/2);
                ctx.rotate((Math.PI * 2 / 12) * i);
                ctx.beginPath();
                ctx.ellipse(0, -35, 12, 45, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            return new THREE.CanvasTexture(canvas2d);
        }

        const lotusTexture = createLotusTexture();

        // 3. إنشاء الجسيمات (أزهار اللوتس)
        const particlesCount = 150; // عدد أقل لتركيز الدقة والواقعية للأزهار الكبيرة
        const geometry = new THREE.BufferGeometry();
        const posArray = new Float32Array(particlesCount * 3);
        const randomOffsets = new Float32Array(particlesCount); // لحركة فيزيائية عشوائية لكل زهرة

        for(let i = 0; i < particlesCount; i++) {
            posArray[i * 3] = (Math.random() - 0.5) * 25;     // x
            posArray[i * 3 + 1] = (Math.random() - 0.5) * 25; // y
            posArray[i * 3 + 2] = (Math.random() - 0.5) * 15; // z
            randomOffsets[i] = Math.random() * Math.PI * 2;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        geometry.setAttribute('aRandom', new THREE.BufferAttribute(randomOffsets, 1));

        // مادة الأزهار
        const material = new THREE.PointsMaterial({
            size: 0.8, // حجم الزهرة
            map: lotusTexture,
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const lotusMesh = new THREE.Points(geometry, material);
        scene.add(lotusMesh);

        camera.position.z = 10;

        // 4. إعداد طبقة الدخان الباهتة (Smoke Fade Plane)
        // هذه الطبقة ترسم لونا أسود شفافاً كل إطار لمسح الإطارات القديمة ببطء، مما يصنع الذيل
        const fadeMaterial = new THREE.MeshBasicMaterial({
            color: 0x030000, // لون الخلفية
            transparent: true,
            opacity: 0.08 // كلما قل الرقم، طال ذيل الدخان
        });
        const fadePlane = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), fadeMaterial);
        fadePlane.position.z = -1; // أمام الكاميرا مباشرة
        camera.add(fadePlane);
        scene.add(camera);

        // 5. التفاعل مع الماوس للحركة ثلاثية الأبعاد
        let mouseX = 0;
        let mouseY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        // 6. حلقة التصيير والفيزياء (Animation Loop)
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // حركة فيزيائية مرنة لكل زهرة (Floating effect)
            const positions = lotusMesh.geometry.attributes.position.array;
            const offsets = lotusMesh.geometry.attributes.aRandom.array;

            for(let i = 0; i < particlesCount; i++) {
                const i3 = i * 3;
                // حركة دائرية وتموجية للأزهار لتوليد ذيل دخان واقعي
                positions[i3] += Math.sin(time * 0.5 + offsets[i]) * 0.01;
                positions[i3 + 1] += Math.cos(time * 0.3 + offsets[i]) * 0.015;
            }
            lotusMesh.geometry.attributes.position.needsUpdate = true;

            // تدوير المجرة بالكامل ببطء
            lotusMesh.rotation.y = time * 0.03;
            lotusMesh.rotation.z = time * 0.01;

            // حركة الكاميرا المتفاعلة مع الماوس
            camera.position.x += (mouseX * 0.002 - camera.position.x) * 0.05;
            camera.position.y += (-mouseY * 0.002 - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }
        animate();

        // 7. دخول احترافي للفيديو عبر GSAP
        gsap.to("#main-video", {
            duration: 2.5,
            opacity: 1,
            scale: 1,
            ease: "expo.out",
            delay: 0.5
        });

        // 8. الاستجابة لتغير حجم الشاشة
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

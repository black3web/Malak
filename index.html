<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilya | Ultra Premium Neon Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* تدرج لوني فخم جداً للخلفية يعزز ألوان النيون */
            background: radial-gradient(circle at 50% 50%, #1a000a 0%, #050002 100%);
            font-family: 'Inter', sans-serif;
        }
        
        #webgl-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        .ui-layer {
            position: relative;
            z-index: 2;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none; 
            padding: 20px;
            box-sizing: border-box;
        }

        /* حاوية الفيديو مع تأثيرات نيون زجاجية فخمة */
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 1000px; /* حجم مثالي للفيديو */
            aspect-ratio: 16 / 9; 
            border-radius: 24px;
            overflow: hidden;
            /* إضاءة نيون مدمجة بين الأحمر والوردي */
            box-shadow: 0 0 60px rgba(255, 0, 51, 0.4), inset 0 0 30px rgba(255, 20, 147, 0.3);
            border: 1px solid rgba(255, 20, 147, 0.4);
            backdrop-filter: blur(15px); 
            pointer-events: auto; 
            opacity: 0;
            transform: translateY(30px) scale(0.95);
        }

        .main-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 24px;
            background-color: #000; /* في حال تأخر الفيديو */
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <div class="ui-layer">
        <div class="video-wrapper">
            <video src="video.mp4" class="main-video" autoplay loop muted playsinline></video>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // 1. إعداد المشهد بجودة فائقة
        const canvas = document.getElementById('webgl-canvas');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0005, 0.015); // ضباب خفيف يدمج الأشكال بالخلفية

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 25;

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // 2. تصميم نسيج (Texture) لزهرة نيون متوهجة برمجياً (لأداء فائق وواقعية)
        function createGlowingFlowerTexture() {
            const size = 128;
            const canvasObj = document.createElement('canvas');
            canvasObj.width = size;
            canvasObj.height = size;
            const ctx = canvasObj.getContext('2d');
            const center = size / 2;

            // توهج مركزي
            const gradient = ctx.createRadialGradient(center, center, 0, center, center, center);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.2, 'rgba(255, 20, 147, 0.9)'); // وردي نيون
            gradient.addColorStop(0.6, 'rgba(255, 0, 51, 0.2)');  // أحمر نيون
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);

            // رسم بتلات ناعمة
            ctx.translate(center, center);
            for(let i = 0; i < 6; i++) {
                ctx.rotate((Math.PI * 2) / 6);
                ctx.beginPath();
                ctx.ellipse(0, 15, 6, 25, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 20, 147, 0.6)';
                ctx.fill();
            }
            return new THREE.CanvasTexture(canvasObj);
        }

        // نسيج دائري ناعم للذيل الدخاني
        function createSoftGlowTexture() {
            const canvasObj = document.createElement('canvas');
            canvasObj.width = 64;
            canvasObj.height = 64;
            const ctx = canvasObj.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
            gradient.addColorStop(0.3, 'rgba(255, 20, 147, 0.5)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvasObj);
        }

        const flowerTex = createGlowingFlowerTexture();
        const glowTex = createSoftGlowTexture();

        // 3. نظام الجزيئات (Particles) المحسن والذيل المرن
        const flowerCount = 350; // زيادة العدد مع الحفاظ على الأداء
        const trailLength = 15;  // طول ذيل السراب لكل زهرة
        
        const flowersData = [];
        const headPositions = new Float32Array(flowerCount * 3);
        const trailPositions = new Float32Array(flowerCount * trailLength * 3);
        const trailAges = new Float32Array(flowerCount * trailLength);

        // تهيئة المواقع العشوائية والحركة الفيزيائية
        for(let i = 0; i < flowerCount; i++) {
            let startX = (Math.random() - 0.5) * 60;
            let startY = (Math.random() - 0.5) * 60;
            let startZ = (Math.random() - 0.5) * 30 - 5;

            flowersData.push({
                x: startX, y: startY, z: startZ,
                speedY: Math.random() * 0.03 + 0.015,
                angleX: Math.random() * Math.PI * 2,
                angleY: Math.random() * Math.PI * 2,
                radius: Math.random() * 1.5 + 0.5,
                swaySpeed: Math.random() * 0.02 + 0.01
            });

            // تهيئة بيانات الذيل
            for(let j = 0; j < trailLength; j++) {
                let idx = (i * trailLength + j) * 3;
                trailPositions[idx] = startX;
                trailPositions[idx+1] = startY;
                trailPositions[idx+2] = startZ;
                trailAges[i * trailLength + j] = j / trailLength; // نسبة العمر للتلاشي
            }
        }

        // هندسة رؤوس الأزهار
        const headGeo = new THREE.BufferGeometry();
        headGeo.setAttribute('position', new THREE.BufferAttribute(headPositions, 3));
        const headMat = new THREE.PointsMaterial({
            size: 2.2, // حجم صغير وأنيق
            map: flowerTex,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });
        const headMesh = new THREE.Points(headGeo, headMat);
        scene.add(headMesh);

        // هندسة الذيل الدخاني (Shaders لأداء فائق وتدرج لوني نيون)
        const trailGeo = new THREE.BufferGeometry();
        trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
        trailGeo.setAttribute('age', new THREE.BufferAttribute(trailAges, 1));

        const trailMat = new THREE.ShaderMaterial({
            uniforms: {
                tex: { value: glowTex },
                colorPink: { value: new THREE.Color(0xff1493) }, // وردي نيون
                colorRed: { value: new THREE.Color(0xff0033) }   // أحمر نيون
            },
            vertexShader: `
                attribute float age;
                varying float vAge;
                void main() {
                    vAge = age;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    // يصغر حجم الذيل كلما ابتعد عن الزهرة
                    gl_PointSize = (25.0 * (1.0 - age)) * (20.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform sampler2D tex;
                uniform vec3 colorPink;
                uniform vec3 colorRed;
                varying float vAge;
                void main() {
                    vec4 texColor = texture2D(tex, gl_PointCoord);
                    // تدرج اللون من الوردي للأحمر حسب طول الذيل
                    vec3 finalColor = mix(colorPink, colorRed, vAge);
                    // يتلاشى الذيل بنعومة
                    float alpha = (1.0 - vAge) * texColor.a * 0.6;
                    gl_FragColor = vec4(finalColor, alpha);
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });
        const trailMesh = new THREE.Points(trailGeo, trailMat);
        scene.add(trailMesh);

        // 4. تفاعل الكاميرا السلس مع الماوس
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        // 5. محرك الحركة (Render Loop) المحسن والمستقر
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            const hPos = headGeo.attributes.position.array;
            const tPos = trailGeo.attributes.position.array;

            for(let i = 0; i < flowerCount; i++) {
                let d = flowersData[i];
                
                // حركة طفو واقعية (صعود + تمايل جانبي)
                d.y += d.speedY;
                if(d.y > 30) { 
                    d.y = -30; // إعادة من الأسفل بسلاسة
                    d.x = (Math.random() - 0.5) * 60;
                }

                let currentX = d.x + Math.sin(d.angleX + time * d.swaySpeed) * d.radius;
                let currentY = d.y + Math.cos(d.angleY + time * d.swaySpeed) * (d.radius * 0.5);
                let currentZ = d.z;

                hPos[i*3] = currentX;
                hPos[i*3+1] = currentY;
                hPos[i*3+2] = currentZ;

                // تحديث الذيل (Ring Buffer) ليلحق بالزهرة كظل أو سراب مرن
                for(let j = trailLength - 1; j > 0; j--) {
                    let currIdx = (i * trailLength + j) * 3;
                    let prevIdx = (i * trailLength + j - 1) * 3;
                    tPos[currIdx] = tPos[prevIdx];
                    tPos[currIdx+1] = tPos[prevIdx+1];
                    tPos[currIdx+2] = tPos[prevIdx+2];
                }
                
                // النقطة الأولى من الذيل تأخذ مكان الزهرة الحالي
                let firstIdx = (i * trailLength) * 3;
                tPos[firstIdx] = currentX;
                tPos[firstIdx+1] = currentY - 0.2; // أسفل الزهرة بقليل
                tPos[firstIdx+2] = currentZ;
            }

            headGeo.attributes.position.needsUpdate = true;
            trailGeo.attributes.position.needsUpdate = true;

            // حركة كاميرا ناعمة جداً
            targetX = mouseX * 0.0015;
            targetY = mouseY * 0.0015;
            camera.position.x += (targetX * 5 - camera.position.x) * 0.02;
            camera.position.y += (-targetY * 5 - camera.position.y) * 0.02;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }
        animate();

        // 6. دخول أنيق جداً لواجهة الفيديو عبر GSAP
        gsap.to(".video-wrapper", {
            duration: 2.5,
            y: 0,
            scale: 1,
            opacity: 1,
            ease: "expo.out",
            delay: 0.8
        });

        // 7. استجابة تلقائية لحجم الشاشة
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

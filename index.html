<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ilya | Deep Space Neon Interface</title>
    <link rel="preload" as="video" href="video.mp4">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #010002; /* أسود فضائي عميق */
            font-family: 'Inter', sans-serif;
            touch-action: none; /* منع التمرير الافتراضي لدعم اللمس بسلاسة */
        }
        
        #webgl-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        .ui-layer {
            position: relative;
            z-index: 2;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none; 
            padding: 20px;
            box-sizing: border-box;
            perspective: 1000px; /* لتمكين الحركة ثلاثية الأبعاد للواجهة */
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 1000px; 
            aspect-ratio: 16 / 9; 
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(255, 0, 51, 0.4), inset 0 0 30px rgba(255, 20, 147, 0.3);
            border: 1px solid rgba(255, 20, 147, 0.4);
            backdrop-filter: blur(15px); 
            pointer-events: auto; 
            opacity: 0;
            /* سيتم التحكم بموقعه عبر GSAP ليلحق بالكاميرا */
        }

        .main-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 24px;
            background-color: #050005; 
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <div class="ui-layer">
        <div class="video-wrapper" id="vidContainer">
            <video src="video.mp4" class="main-video" autoplay loop muted playsinline preload="auto"></video>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // 1. إعداد المشهد
        const canvas = document.getElementById('webgl-canvas');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x010002, 0.012); 

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.z = 30;

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // 2. تصميم خلفية الفضاء الواقعي (نجوم ساطعة وبعيدة)
        const starGeo = new THREE.BufferGeometry();
        const starCount = 6000; // عدد هائل من النجوم
        const starPos = new Float32Array(starCount * 3);
        const starColors = new Float32Array(starCount * 3);

        for(let i = 0; i < starCount; i++) {
            // توزيع كروي واسع جداً لإعطاء إحساس اللانهاية
            starPos[i*3] = (Math.random() - 0.5) * 400;
            starPos[i*3+1] = (Math.random() - 0.5) * 400;
            starPos[i*3+2] = (Math.random() - 0.5) * 400;

            // تنويع ألوان النجوم (أبيض، مزرق، وردي خفيف)
            let starType = Math.random();
            let r = 1, g = 1, b = 1;
            if(starType > 0.8) { r = 1; g = 0.8; b = 0.9; } // نجوم مائلة للوردي
            else if(starType > 0.6) { r = 0.8; g = 0.9; b = 1; } // نجوم مائلة للأزرق

            starColors[i*3] = r;
            starColors[i*3+1] = g;
            starColors[i*3+2] = b;
        }

        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));

        const starMat = new THREE.PointsMaterial({
            size: 0.4,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            sizeAttenuation: true
        });
        const starsMesh = new THREE.Points(starGeo, starMat);
        scene.add(starsMesh);

        // 3. تحسين شكل الزهرة برمجياً لتكون أدق وأجمل
        function createGlowingFlowerTexture() {
            const size = 128;
            const canvasObj = document.createElement('canvas');
            canvasObj.width = size;
            canvasObj.height = size;
            const ctx = canvasObj.getContext('2d');
            const center = size / 2;

            // توهج أعمق
            const gradient = ctx.createRadialGradient(center, center, 0, center, center, center);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.15, 'rgba(255, 20, 147, 1)'); 
            gradient.addColorStop(0.5, 'rgba(255, 0, 51, 0.4)');  
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);

            // بتلات أكثر دقة ووضوحاً
            ctx.translate(center, center);
            for(let i = 0; i < 8; i++) { // 8 بتلات بدلاً من 6 لشكل أكثر اكتمالاً
                ctx.rotate((Math.PI * 2) / 8);
                ctx.beginPath();
                ctx.ellipse(0, 18, 5, 28, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 105, 180, 0.7)';
                ctx.fill();
            }
            return new THREE.CanvasTexture(canvasObj);
        }

        function createSoftGlowTexture() {
            const canvasObj = document.createElement('canvas');
            canvasObj.width = 64;
            canvasObj.height = 64;
            const ctx = canvasObj.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
            gradient.addColorStop(0.3, 'rgba(255, 20, 147, 0.6)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvasObj);
        }

        const flowerTex = createGlowingFlowerTexture();
        const glowTex = createSoftGlowTexture();

        // 4. نظام الأزهار والذيل الدخاني (زيادة طول الذيل)
        const flowerCount = 350; 
        const trailLength = 28;  // تم زيادة طول الذيل بشكل ملحوظ
        
        const flowersData = [];
        const headPositions = new Float32Array(flowerCount * 3);
        const trailPositions = new Float32Array(flowerCount * trailLength * 3);
        const trailAges = new Float32Array(flowerCount * trailLength);

        for(let i = 0; i < flowerCount; i++) {
            let startX = (Math.random() - 0.5) * 80; // انتشار أوسع في الفضاء
            let startY = (Math.random() - 0.5) * 80;
            let startZ = (Math.random() - 0.5) * 50 - 10;

            flowersData.push({
                x: startX, y: startY, z: startZ,
                speedY: Math.random() * 0.04 + 0.02,
                angleX: Math.random() * Math.PI * 2,
                angleY: Math.random() * Math.PI * 2,
                radius: Math.random() * 2.0 + 0.5,
                swaySpeed: Math.random() * 0.02 + 0.01
            });

            for(let j = 0; j < trailLength; j++) {
                let idx = (i * trailLength + j) * 3;
                trailPositions[idx] = startX;
                trailPositions[idx+1] = startY;
                trailPositions[idx+2] = startZ;
                trailAges[i * trailLength + j] = j / trailLength; 
            }
        }

        const headGeo = new THREE.BufferGeometry();
        headGeo.setAttribute('position', new THREE.BufferAttribute(headPositions, 3));
        const headMat = new THREE.PointsMaterial({
            size: 2.5, 
            map: flowerTex,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });
        const headMesh = new THREE.Points(headGeo, headMat);
        scene.add(headMesh);

        const trailGeo = new THREE.BufferGeometry();
        trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
        trailGeo.setAttribute('age', new THREE.BufferAttribute(trailAges, 1));

        const trailMat = new THREE.ShaderMaterial({
            uniforms: {
                tex: { value: glowTex },
                colorPink: { value: new THREE.Color(0xff1493) }, 
                colorRed: { value: new THREE.Color(0xff0033) }   
            },
            vertexShader: `
                attribute float age;
                varying float vAge;
                void main() {
                    vAge = age;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    // ذيل أعرض قليلاً
                    gl_PointSize = (35.0 * (1.0 - age)) * (20.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform sampler2D tex;
                uniform vec3 colorPink;
                uniform vec3 colorRed;
                varying float vAge;
                void main() {
                    vec4 texColor = texture2D(tex, gl_PointCoord);
                    vec3 finalColor = mix(colorPink, colorRed, vAge);
                    float alpha = (1.0 - vAge) * texColor.a * 0.7; // وضوح أعلى للذيل
                    gl_FragColor = vec4(finalColor, alpha);
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });
        const trailMesh = new THREE.Points(trailGeo, trailMat);
        scene.add(trailMesh);

        // 5. التفاعل المتقدم (يدعم اللمس على الأجهزة بقوة) لإحساس الفضاء اللانهائي
        let targetCamX = 0, targetCamY = 0;
        let isInteracting = false;

        // دالة موحدة للماوس واللمس
        function onPointerMove(event) {
            isInteracting = true;
            // حساب الإحداثيات بالنسبة للشاشة (من -1 إلى 1)
            let clientX = event.touches ? event.touches[0].clientX : event.clientX;
            let clientY = event.touches ? event.touches[0].clientY : event.clientY;
            
            let normX = (clientX / window.innerWidth) * 2 - 1;
            let normY = -(clientY / window.innerHeight) * 2 + 1;

            // 1. حركة الكاميرا: مسافة كبيرة جداً لتعطي إحساس الفضاء (تم مضاعفة الرقم)
            targetCamX = normX * 25; 
            targetCamY = normY * 25;

            // 2. حركة الفيديو (شبه ثابت ويلحق الكاميرا بنعومة - Parallax)
            gsap.to("#vidContainer", {
                x: normX * 30,       // يتحرك قليلاً ليلحق الحركة
                y: -normY * 30,
                rotationY: normX * 5, // دوران 3D خفيف
                rotationX: normY * 5,
                duration: 1.5,
                ease: "power2.out"
            });
        }

        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('touchmove', onPointerMove, { passive: true }); // للأجهزة بقوة

        // 6. محرك الحركة (Render Loop)
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            // دوران خلفية النجوم ببطء شديد
            starsMesh.rotation.y = time * 0.05;
            starsMesh.rotation.x = time * 0.02;

            const hPos = headGeo.attributes.position.array;
            const tPos = trailGeo.attributes.position.array;

            for(let i = 0; i < flowerCount; i++) {
                let d = flowersData[i];
                
                d.y += d.speedY;
                if(d.y > 40) { 
                    d.y = -40; 
                    d.x = (Math.random() - 0.5) * 80;
                }

                let currentX = d.x + Math.sin(d.angleX + time * d.swaySpeed) * d.radius;
                let currentY = d.y + Math.cos(d.angleY + time * d.swaySpeed) * (d.radius * 0.5);
                let currentZ = d.z;

                hPos[i*3] = currentX;
                hPos[i*3+1] = currentY;
                hPos[i*3+2] = currentZ;

                for(let j = trailLength - 1; j > 0; j--) {
                    let currIdx = (i * trailLength + j) * 3;
                    let prevIdx = (i * trailLength + j - 1) * 3;
                    tPos[currIdx] = tPos[prevIdx];
                    tPos[currIdx+1] = tPos[prevIdx+1];
                    tPos[currIdx+2] = tPos[prevIdx+2];
                }
                
                let firstIdx = (i * trailLength) * 3;
                tPos[firstIdx] = currentX;
                tPos[firstIdx+1] = currentY - 0.2;
                tPos[firstIdx+2] = currentZ;
            }

            headGeo.attributes.position.needsUpdate = true;
            trailGeo.attributes.position.needsUpdate = true;

            // حركة الكاميرا بنعومة وانسيابية نحو الهدف المطلوب
            if (isInteracting) {
                camera.position.x += (targetCamX - camera.position.x) * 0.03;
                camera.position.y += (targetCamY - camera.position.y) * 0.03;
            } else {
                // حركة تلقائية هادئة إذا لم يكن هناك تفاعل
                camera.position.x = Math.sin(time * 0.5) * 5;
                camera.position.y = Math.cos(time * 0.5) * 5;
            }
            
            camera.lookAt(scene.position);
            renderer.render(scene, camera);
        }
        animate();

        // 7. دخول احترافي لواجهة الفيديو
        gsap.to(".video-wrapper", {
            duration: 2.5,
            scale: 1,
            opacity: 1,
            ease: "expo.out",
            delay: 0.5
        });

        // 8. الاستجابة لحجم الشاشة
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

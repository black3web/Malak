<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilya | Ultra Premium WebGL</title>
    <style>
        /* إعدادات الصفحة الأساسية بخلفية عميقة جداً لإبراز الفخامة */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #110005 0%, #050002 60%, #000000 100%);
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        /* طبقة الـ Canvas لتشغيل محرك 3D */
        #webgl-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* حاوية واجهة المستخدم */
        .ui-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* للسماح للضغط بالمرور للخلفية */
            padding: 20px;
            box-sizing: border-box;
        }

        /* حاوية الفيديو - تصميم زجاجي فاخر جداً (Glassmorphism) */
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            border-radius: 24px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9), 
                        0 0 0 1px rgba(255, 105, 180, 0.15),
                        inset 0 0 30px rgba(255, 20, 147, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            pointer-events: auto;
            /* سيتم عمل أنيميشن للظهور عبر JS لضمان عمله */
            transform: translateY(20px);
            opacity: 0; 
            transition: opacity 1.5s ease-out, transform 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .video-wrapper.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .main-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 24px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <div class="ui-layer">
        <div class="video-wrapper" id="vidWrapper">
            <video id="bgVideo" src="video.mp4" class="main-video" autoplay loop muted playsinline preload="auto"></video>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // ==========================================
        // 1. إعدادات محرك Three.js الأساسية
        // ==========================================
        const canvas = document.getElementById('webgl-canvas');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050002, 0.02); // ضباب لدمج العناصر البعيدة

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 25;

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // إضاءة لإبراز تفاصيل الزهور 3D
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xff69b4, 2, 50);
        scene.add(pointLight);

        // ==========================================
        // 2. تصميم خامة بتلة اللوتس (Texture) بواقعية عالية
        // ==========================================
        function createPetalTexture() {
            const c = document.createElement('canvas');
            c.width = 256; c.height = 512;
            const ctx = c.getContext('2d');
            
            // رسم شكل بتلة منحني وواقعي
            ctx.beginPath();
            ctx.moveTo(128, 480);
            ctx.bezierCurveTo(40, 300, 20, 100, 128, 20);
            ctx.bezierCurveTo(236, 100, 216, 300, 128, 480);
            
            // تدرج لوني يعطي عمقاً وإحساساً عضوياً (وردي وأبيض)
            const gradient = ctx.createLinearGradient(0, 0, 0, 512);
            gradient.addColorStop(0.1, 'rgba(255, 255, 255, 0.9)'); 
            gradient.addColorStop(0.4, 'rgba(255, 105, 180, 0.85)');
            gradient.addColorStop(0.8, 'rgba(199, 21, 133, 0.6)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fill();
            
            const tex = new THREE.Texture(c);
            tex.needsUpdate = true;
            return tex;
        }
        const petalTexture = createPetalTexture();

        // ==========================================
        // 3. بناء زهرة لوتس 3D من عدة بتلات
        // ==========================================
        // استخدمنا خامة البتلة على مسطحات ندمجها لنكون زهرة 3D تدور بواقعية
        const petalGeo = new THREE.PlaneGeometry(2, 4);
        const petalMat = new THREE.MeshStandardMaterial({
            map: petalTexture,
            transparent: true,
            side: THREE.DoubleSide,
            depthWrite: false,
            blending: THREE.NormalBlending
        });

        function create3DLotus() {
            const lotusGroup = new THREE.Group();
            const numPetals = 6;
            for(let i = 0; i < numPetals; i++) {
                const petal = new THREE.Mesh(petalGeo, petalMat);
                // تدوير وتوزيع البتلات بشكل دائري لتكوين زهرة
                petal.rotation.y = (i * Math.PI * 2) / numPetals;
                petal.rotation.x = 0.4; // انحناء البتلة للخارج
                petal.position.y = 1;
                
                const pivot = new THREE.Group();
                pivot.add(petal);
                lotusGroup.add(pivot);
            }
            // تقليل الحجم ليكون أنيقاً وغير مزعج
            lotusGroup.scale.set(0.4, 0.4, 0.4);
            return lotusGroup;
        }

        // ==========================================
        // 4. نظام إدارة الأزهار والفيزياء المائعة (Fluid Dynamics)
        // ==========================================
        const numFlowers = 35; // عدد أقل بجودة أعلى جداً (Premium Style)
        const flowers = [];
        
        for (let i = 0; i < numFlowers; i++) {
            const lotus = create3DLotus();
            
            // مواقع عشوائية موزعة في الفضاء
            lotus.position.set(
                (Math.random() - 0.5) * 50,
                (Math.random() - 0.5) * 30,
                (Math.random() - 0.5) * 20 - 5
            );
            scene.add(lotus);

            flowers.push({
                mesh: lotus,
                velocity: new THREE.Vector3(
                    (Math.random() - 0.5) * 0.02,
                    Math.random() * 0.02 + 0.01,
                    (Math.random() - 0.5) * 0.02
                ),
                baseY: Math.random() * 0.02 + 0.01,
                rotSpeed: new THREE.Vector3(
                    (Math.random() - 0.5) * 0.01,
                    (Math.random() - 0.5) * 0.02,
                    (Math.random() - 0.5) * 0.01
                ),
                trailPositions: [] // مصفوفة لحفظ المسار لتكوين الذيل المرن
            });
        }

        // ==========================================
        // 5. نظام الذيل المرئي المرن (Silky Trails)
        // ==========================================
        // ذيول حريرية ناعمة جداً تعتمد على الخطوط السميكة (Lines) 
        const trailMaterial = new THREE.LineBasicMaterial({
            color: 0xff1493, // وردي فخم
            transparent: true,
            opacity: 0.4,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        flowers.forEach(flower => {
            const trailGeo = new THREE.BufferGeometry();
            const trailLine = new THREE.Line(trailGeo, trailMaterial);
            scene.add(trailLine);
            flower.trailLine = trailLine;
        });

        // ==========================================
        // 6. التفاعل السلس والناعم جداً مع الضغط (Ripple Force)
        // ==========================================
        let rippleCenter = new THREE.Vector3();
        let rippleForce = 0;

        // التقاط إحداثيات الماوس للتفاعل
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        document.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            // تحديد نقطة في الفضاء 3D بناءً على الضغطة
            raycaster.ray.at(25, rippleCenter); 
            
            // تنشيط قوة الموجة بنعومة
            rippleForce = 0.8; 
        });

        // حركة الماوس لتدوير الكاميرا بنعومة
        let mouseTarget = new THREE.Vector2();
        document.addEventListener('mousemove', (event) => {
            mouseTarget.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouseTarget.y = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        // ==========================================
        // 7. حلقة التحديث والحركة (Render Loop)
        // ==========================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // تناقص قوة الموجة (الضغطة) تدريجياً لتعود الحركة طبيعية
            rippleForce *= 0.95;

            flowers.forEach((flower) => {
                // --- حساب التفاعل مع الموجة (الضغط) ---
                if (rippleForce > 0.01) {
                    const dir = new THREE.Vector3().subVectors(flower.mesh.position, rippleCenter);
                    const dist = dir.length();
                    if (dist < 20) { // تأثير الموجة ضمن قطر معين
                        dir.normalize();
                        // دفع الأزهار بعيداً عن مركز الضغطة بانسيابية
                        const force = (1 - dist / 20) * rippleForce * 0.1;
                        flower.velocity.add(dir.multiplyScalar(

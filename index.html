<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ilya | Cinematic Flee Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #020005;
            font-family: 'Inter', sans-serif;
            cursor: pointer; /* لإعطاء إيحاء بالتفاعل */
        }
        
        #webgl-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        .ui-layer {
            position: relative;
            z-index: 2;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none; 
        }

        .video-wrapper {
            position: relative;
            width: 90%;
            max-width: 950px; 
            aspect-ratio: 16 / 9; 
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 0 70px rgba(255, 20, 147, 0.3);
            border: 1px solid rgba(255, 20, 147, 0.2);
            backdrop-filter: blur(20px); 
            transform: scale(0.9);
            opacity: 0;
        }

        .main-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <div class="ui-layer">
        <div class="video-wrapper" id="vidBox">
            <video src="video.mp4" class="main-video" autoplay loop muted playsinline fetchpriority="high"></video>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // 1. الأساسيات
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ 
            canvas: document.getElementById('webgl-canvas'), 
            antialias: true, 
            alpha: true 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // 2. تصميم "زهرة نيون واقعية" بدون تشوه
        function createHighResFlower() {
            const size = 256; // دقة عالية جداً لمنع المربعات
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            const c = size / 2;

            // توهج داخلي ناعم جداً
            const grad = ctx.createRadialGradient(c, c, 0, c, c, c);
            grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
            grad.addColorStop(0.2, 'rgba(255, 20, 147, 0.8)');
            grad.addColorStop(0.5, 'rgba(255, 0, 51, 0.2)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            
            ctx.fillStyle = grad;
            ctx.fillRect(0,0, size, size);

            // رسم البتلات بدقة
            ctx.translate(c, c);
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ff1493";
            for(let i=0; i<8; i++){
                ctx.rotate(Math.PI/4);
                ctx.beginPath();
                ctx.ellipse(0, 30, 12, 50, 0, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(255, 20, 147, 0.5)';
                ctx.fill();
            }
            return new THREE.CanvasTexture(canvas);
        }

        const flowerTexture = createHighResFlower();

        // 3. نظام الجزيئات (الأزهار والذيل)
        const count = 300;
        const trailLen = 25;
        const flowers = [];
        const headPos = new Float32Array(count * 3);
        const trailPos = new Float32Array(count * trailLen * 3);
        const trailAge = new Float32Array(count * trailLen);

        for(let i=0; i<count; i++) {
            flowers.push({
                x: (Math.random()-0.5)*120,
                y: (Math.random()-0.5)*120,
                z: (Math.random()-0.5)*100 - 50,
                vel: Math.random() * 0.05 + 0.02,
                sineIdx: Math.random() * Math.PI * 2
            });
        }

        const headGeo = new THREE.BufferGeometry();
        headGeo.setAttribute('position', new THREE.BufferAttribute(headPos, 3));
        const headMat = new THREE.PointsMaterial({
            size: 4, 
            map: flowerTexture, 
            transparent: true, 
            blending: THREE.AdditiveBlending, 
            depthWrite: false 
        });
        const headMesh = new THREE.Points(headGeo, headMat);
        scene.add(headMesh);

        // ذيل دخاني طويل
        const trailGeo = new THREE.BufferGeometry();
        trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPos, 3));
        const trailMat = new THREE.ShaderMaterial({
            uniforms: {
                color1: { value: new THREE.Color(0xff1493) },
                color2: { value: new THREE.Color(0xff0033) }
            },
            vertexShader: `
                attribute float age;
                varying float vAge;
                void main() {
                    vAge = age;
                    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = (20.0 * (1.0 - age)) * (50.0 / -mvPos.z);
                    gl_Position = projectionMatrix * mvPos;
                }
            `,
            fragmentShader: `
                uniform vec3 color1;
                uniform vec3 color2;
                varying float vAge;
                void main() {
                    float r = length(gl_PointCoord - vec2(0.5));
                    if(r > 0.5) discard;
                    vec3 col = mix(color1, color2, vAge);
                    gl_FragColor = vec4(col, (0.5 - r) * (1.0 - vAge) * 0.8);
                }
            `,
            transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
        });

        // توزيع الأعمار للذيل
        for(let i=0; i<count; i++) {
            for(let j=0; j<trailLen; j++) trailAge[i*trailLen + j] = j/trailLen;
        }
        trailGeo.setAttribute('age', new THREE.BufferAttribute(trailAge, 1));
        const trailMesh = new THREE.Points(trailGeo, trailMat);
        scene.add(trailMesh);

        // 4. نظام "الهروب عند الضغط" (Flee Logic)
        camera.position.z = 80;
        let targetY = 0;
        let currentY = 0;

        window.addEventListener('mousedown', (e) => {
            const normalizedY = (e.clientY / window.innerHeight) * 2 - 1; // -1 (top) to 1 (bottom)
            
            // إذا ضغط فوق (Y < 0)، اهرب للأسفل (Target Y إيجابي للكاميرا لترى الأسفل)
            // إذا ضغط تحت (Y > 0)، اهرب للأعلى
            const fleeDistance = 45;
            targetY = normalizedY < 0 ? -fleeDistance : fleeDistance;

            // تأثير اهتزاز خفيف للفيديو لإعطاء إحساس القوة
            gsap.to("#vidBox", {
                y: normalizedY < 0 ? 20 : -20,
                duration: 0.1,
                yoyo: true,
                repeat: 1
            });
        });

        // 5. حلقة التحريك (Loop)
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.015;

            // تحريك الأزهار والذيل
            for(let i=0; i<count; i++) {
                let f = flowers[i];
                f.y += f.vel;
                if(f.y > 60) f.y = -60;

                let x = f.x + Math.sin(time + f.sineIdx) * 5;
                let y = f.y;
                let z = f.z;

                headPos[i*3] = x;
                headPos[i*3+1] = y;
                headPos[i*3+2] = z;

                // تحديث الذيل
                for(let j=trailLen-1; j>0; j--) {
                    let idx = (i*trailLen + j)*3;
                    let prev = (i*trailLen + j-1)*3;
                    trailPos[idx] = trailPos[prev];
                    trailPos[idx+1] = trailPos[prev+1];
                    trailPos[idx+2] = trailPos[prev+2];
                }
                trailPos[(i*trailLen)*3] = x;
                trailPos[(i*trailLen)*3+1] = y;
                trailPos[(i*trailLen)*3+2] = z;
            }

            headGeo.attributes.position.needsUpdate = true;
            trailGeo.attributes.position.needsUpdate = true;

            // تطبيق نظام الهروب السلس للكاميرا
            currentY += (targetY - currentY) * 0.05; // سرعة الهروب
            targetY *= 0.96; // العودة التدريجية للمركز (القصور الذاتي)

            camera.position.y = currentY;
            camera.lookAt(0, 0, 0);

            // تحريك الفيديو بشكل طفيف جداً ليلحق بالكاميرا (Parallax)
            gsap.to("#vidBox", {
                y: -currentY * 0.5,
                duration: 0.5
            });

            renderer.render(scene, camera);
        }

        animate();

        // دخول الفيديو
        gsap.to("#vidBox", { opacity: 1, scale: 1, duration: 2, ease: "expo.out", delay: 0.5 });

        // التجاوب مع الشاشة
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

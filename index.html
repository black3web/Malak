<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيد ميلاد حبيبتي ملاك</title>
<style>
/* CSS Reset and Global Styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    background: #000000;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Use modern Arabic fonts */
    color: #ffffff;
    height: 100vh;
    width: 100vw;
}

/* Base Container to handle the whole scene */
.main-container {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 1000px; /* For depth */
}

/* Layer 1: Futuristic City Background (First to appear) */
.city-background {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8Xw8AAoMBgX3b/38AAAAASUVORK5CYII='); /* Representative deep black city texture */
    background-size: cover;
    opacity: 0;
    z-index: -3;
    animation: fadeInCity 3s forwards;
    filter: blur(10px); /* Initially blurred */
}

/* Layer 2: Moving Starry Sky (Second to appear) */
.sky-background {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #2d0a2d 0%, #1a0a1a 70%, #0d0d0d 100%);
    opacity: 0;
    z-index: -2;
    animation: fadeInSky 3s 1.5s forwards;
    overflow: hidden;
}

.sky-stars {
    position: absolute;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36z8gAF8jNzf3PYF47q5F57axH57WzBqA78Y+Y7gAAAABJRU5ErkJggg=='); /* Simple stars pattern */
    opacity: 0.8;
    animation: skyMovement 60s infinite linear;
}

/* Particle system for sky (all things move inside it) */
.particles-sky {
    position: absolute;
    width: 100%;
    height: 100%;
}

.particle-sky {
    position: absolute;
    background-color: #ff00ff; /* Pink neon particles */
    border-radius: 50%;
    opacity: 0.5;
    animation: particleFall 10s infinite linear;
}

/* Add many particles */
.particle-sky:nth-child(1) { width: 2px; height: 2px; top: 10%; left: 20%; animation-duration: 12s; }
.particle-sky:nth-child(2) { width: 3px; height: 3px; top: 30%; left: 80%; animation-duration: 9s; }
.particle-sky:nth-child(3) { width: 2px; height: 2px; top: 70%; left: 50%; animation-duration: 15s; }
/* ... and so on (more particles can be added) */

/* Layer 3: Room Structure (Third to appear) */
.room-structure {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: -1;
    display: flex;
    justify-content: center;
    opacity: 0;
    animation: fadeInRoom 3s 3s forwards;
}

/* Floor */
.floor {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 20vh;
    background: #0d0d0d;
    border-top: 2px solid #1a1a1a;
    box-shadow: inset 0 20px 50px rgba(255, 0, 255, 0.1);
}

/* Side Panels/Pillars */
.side-pillar {
    position: absolute;
    top: 0;
    height: 80vh;
    width: 15vw;
    background: #111111;
    border: 1px solid #1a1a1a;
    box-shadow: 0 0 50px rgba(255, 0, 255, 0.1);
}

.left-pillar { left: 0; border-right: 2px solid #1a1a1a; }
.right-pillar { right: 0; border-left: 2px solid #1a1a1a; }

/* Layer 4: Central Content (Fourth to appear) */
.central-content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80vw;
    height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    animation: fadeInContent 3s 4.5s forwards;
    z-index: 10;
}

/* Neon Roses Container */
.roses-container {
    position: absolute;
    width: 300px;
    height: 300px;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    animation: fadeInRoses 3s 6s forwards;
}

/* Individual Neon Rose (representing the complex networked roses) */
.neon-rose {
    position: absolute;
    width: 100px;
    height: 100px;
    opacity: 0;
    animation: roseAppearance 3s forwards, roseSway 5s infinite ease-in-out, roseBreathe 10s infinite ease-in-out;
}

.neon-rose .petal {
    position: absolute;
    border-radius: 50%;
    border: 2px solid #ff00ff; /* Pink Neon */
    box-shadow: 0 0 20px #ff00ff, 0 0 40px #dc143c; /* Glow effects */
    animation: petalMorph 10s infinite ease-in-out;
}

/* Create detailed rose structure with overlapping petals */
.neon-rose:nth-child(1) { top: -60px; left: -60px; --delay: 0s; }
.neon-rose:nth-child(2) { top: -60px; right: -60px; --delay: 1s; }
.neon-rose:nth-child(3) { bottom: -60px; left: -60px; --delay: 2s; }
.neon-rose:nth-child(4) { bottom: -60px; right: -60px; --delay: 3s; }

.neon-rose-core {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 20px;
    height: 20px;
    background-color: #dc143c; /* Red Core */
    border-radius: 50%;
    box-shadow: 0 0 30px #dc143c;
}

/* Petal details */
.neon-rose .petal:nth-child(1) { width: 90px; height: 90px; top: 5%; left: 5%; animation-delay: calc(var(--delay) + 0s); }
.neon-rose .petal:nth-child(2) { width: 80px; height: 80px; top: 10%; left: 10%; animation-delay: calc(var(--delay) + 0.5s); }
.neon-rose .petal:nth-child(3) { width: 70px; height: 70px; top: 15%; left: 15%; animation-delay: calc(var(--delay) + 1s); }
.neon-rose .petal:nth-child(4) { width: 60px; height: 60px; top: 20%; left: 20%; animation-delay: calc(var(--delay) + 1.5s); }

/* Flying Screen Panels (appear fifth) */
.screen-panels {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 5;
    opacity: 0;
    animation: fadeInScreens 3s 7.5s forwards;
}

.panel {
    position: absolute;
    width: 120px;
    height: 160px;
    background: rgba(17, 17, 17, 0.7);
    border: 2px solid #ff00ff; /* Pink Neon */
    border-radius: 5px;
    box-shadow: 0 0 20px #ff00ff;
    padding: 10px;
    overflow: hidden;
    color: #dc143c; /* Dark Red Neon text on panels */
    font-size: 10px;
    animation: panelFloat 10s infinite ease-in-out;
}

.left-panels { left: 5vw; }
.right-panels { right: 5vw; }

.panel:nth-child(1) { top: 20vh; animation-delay: 0s; --float-dist: 20px; }
.panel:nth-child(2) { top: 40vh; animation-delay: 1.5s; --float-dist: -20px; }
.panel:nth-child(3) { top: 60vh; animation-delay: 3s; --float-dist: 15px; }

/* Panel details (mock HUD data) */
.panel h4 { font-size: 14px; margin-bottom: 5px; color: #ff00ff; }
.panel p { margin-bottom: 3px; text-transform: uppercase; }

/* Arabic Message Text (appears sixth, from nowhere) */
.message-container {
    position: absolute;
    width: 60vw;
    text-align: center;
    direction: rtl; /* Right-to-left for Arabic */
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 50px rgba(255, 0, 255, 0.3);
    overflow: hidden;
}

.message-line {
    font-size: 2vw; /* Use vw for responsiveness */
    line-height: 1.6;
    opacity: 0;
    display: inline-block; /* Required for the character-by-character animation */
    white-space: pre-wrap; /* Preserve spaces and allow breaks */
    font-weight: bold;
    animation: fadeInLine 0.1s forwards; /* Basic show, delay will be per char in JS */
}

/* Individual character animation effect */
.message-line span {
    opacity: 0;
    animation: charReveal 0.5s forwards;
    display: inline-block;
    color: #ff1493; /* Deep Pink Neon */
    filter: drop-shadow(0 0 10px #ff1493);
    animation-delay: var(--char-delay);
}

/* Specific glowing effect for lines */
.message-line:nth-child(1) span { color: #ff00ff; filter: drop-shadow(0 0 15px #ff00ff); }
.message-line:nth-child(2) span { color: #ffffff; filter: drop-shadow(0 0 10px #ffffff); }
.message-line:nth-child(3) span { color: #ff1493; filter: drop-shadow(0 0 15px #ff1493); }

/* Background Dust Particles */
.dust-container {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 100;
    pointer-events: none;
}

.dust-particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background-color: #ff00ff; /* Pink neon */
    border-radius: 50%;
    opacity: 0.1;
    animation: dustFloat 15s infinite linear;
}

/* Animations (Keyframes) */

/* Fade-in for City (at 0s) */
@keyframes fadeInCity {
    0% { opacity: 0; filter: blur(20px); }
    100% { opacity: 1; filter: blur(0px); }
}

/* Fade-in for Sky (at 1.5s) */
@keyframes fadeInSky {
    0% { opacity: 0; }
    100% { opacity: 1; }
}

/* Sky Movement */
@keyframes skyMovement {
    0% { transform: translate(0, 0); }
    100% { transform: translate(-20%, 0%); } /* Move left */
}

/* Sky Particle Fall */
@keyframes particleFall {
    0% { transform: translateY(-20%); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(120%); opacity: 0; }
}

/* Fade-in for Room (at 3s) */
@keyframes fadeInRoom {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
}

/* Fade-in for Content (at 4.5s) */
@keyframes fadeInContent {
    0% { opacity: 0; }
    100% { opacity: 1; }
}

/* Fade-in for Roses (at 6s) */
@keyframes fadeInRoses {
    0% { opacity: 0; }
    100% { opacity: 1; }
}

/* Individual rose appearance and pulse */
@keyframes roseAppearance {
    0% { opacity: 0; transform: scale(0.1); }
    100% { opacity: 1; transform: scale(1); }
}

/* Rose Swaying gently */
@keyframes roseSway {
    0%, 100% { transform: rotate(-3deg) translate(0, 0); }
    50% { transform: rotate(3deg) translate(-10px, 10px); }
}

/* Rose Breathing (opening and closing slightly) */
@keyframes roseBreathe {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.8; }
}

/* Petal Morphing */
@keyframes petalMorph {
    0%, 100% { border-radius: 50% 50% 50% 50%; opacity: 1; }
    25% { border-radius: 40% 60% 40% 60%; opacity: 0.8; }
    50% { border-radius: 60% 40% 60% 40%; opacity: 1; }
    75% { border-radius: 50% 50% 50% 50%; opacity: 0.9; }
}

/* Fade-in for Screens (at 7.5s) */
@keyframes fadeInScreens {
    0% { opacity: 0; transform: scale(0.1); }
    100% { opacity: 1; transform: scale(1); }
}

/* Panel Floating */
@keyframes panelFloat {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    50% { transform: translate(var(--float-dist), calc(var(--float-dist) * -1)) rotate(calc(var(--float-dist) / 10)); }
}

/* Fade-in for lines (at JS controlled times) */
@keyframes fadeInLine {
    0% { opacity: 0; }
    100% { opacity: 1; }
}

/* Individual character reveal */
@keyframes charReveal {
    0% { opacity: 0; transform: scale(2) rotateY(90deg); filter: blur(10px); }
    100% { opacity: 1; transform: scale(1) rotateY(0deg); filter: blur(0px); }
}

/* Dust Particles Floating */
@keyframes dustFloat {
    0% { transform: translate(0, 0) scale(0.1); opacity: 0; }
    10% { opacity: 0.2; }
    90% { opacity: 0.2; }
    100% { transform: translate(calc(100vw - 100px), calc(100vh - 100px)) scale(1.5); opacity: 0; }
}

/* Mobile Responsiveness */
@media screen and (max-width: 768px) {
    .message-line {
        font-size: 5vw; /* Increase font size on mobile */
    }

    .message-container {
        width: 80vw;
    }

    .central-content {
        height: 60vh;
    }

    .roses-container {
        transform: scale(0.8);
    }

    .panel {
        width: 100px;
        height: 120px;
        font-size: 8px;
    }

    .left-panels { left: -5vw; } /* Move further left on mobile */
    .right-panels { right: -5vw; } /* Move further right on mobile */
}

</style>
</head>
<body>

<div class="main-container">

    <div class="city-background"></div>

    <div class="sky-background">
        <div class="sky-stars"></div>
        <div class="particles-sky">
            <div class="particle-sky"></div>
            <div class="particle-sky"></div>
            <div class="particle-sky"></div>
            </div>
    </div>

    <div class="room-structure">
        <div class="left-pillar side-pillar"></div>
        <div class="right-pillar side-pillar"></div>
        <div class="floor"></div>
    </div>

    <div class="central-content">
        
        <div class="screen-panels">
            <div class="left-panels">
                <div class="panel"><h4>HUD.01</h4><p>SYSTEM OK</p><p>FLOWER.NET ACTIVE</p></div>
                <div class="panel"><h4>HUD.02</h4><p>NEON LVL: 95%</p><p>GALAXY SCAN</p></div>
                <div class="panel"><h4>HUD.03</h4><p>TARGET: MALAK</p><p>LOVE.DLL LOADED</p></div>
            </div>
            <div class="right-panels">
                <div class="panel"><h4>HUD.04</h4><p>HEART_RATE: NOMINAL</p></div>
                <div class="panel"><h4>HUD.05</h4><p>EMOTION.DAT PROCESSING</p></div>
                <div class="panel"><h4>HUD.06</h4><p>DATA STREAM: OK</p></div>
            </div>
        </div>

        <div class="roses-container">
            <div class="neon-rose">
                <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
                <div class="neon-rose-core"></div>
            </div>
            <div class="neon-rose">
                <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
                <div class="neon-rose-core"></div>
            </div>
            <div class="neon-rose">
                <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
                <div class="neon-rose-core"></div>
            </div>
            <div class="neon-rose">
                <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
                <div class="neon-rose-core"></div>
            </div>
        </div>

        <div class="message-container" id="messageContainer">
            <div class="message-line" id="line1"></div>
            <div class="message-line" id="line2"></div>
            <div class="message-line" id="line3"></div>
        </div>

    </div>

    <div class="dust-container" id="dustContainer">
        <div class="dust-particle"></div><div class="dust-particle"></div><div class="dust-particle"></div>
        <div class="dust-particle"></div><div class="dust-particle"></div><div class="dust-particle"></div>
        </div>

</div>

<script>
    // Message Text Data
    const textLines = [
        "(كل عام وأنتي بالف خير يا أحلى شي بحيات.",
        "يا رب سنة سعيدة عليج وكلها خير وعافية عليج يعمري .",
        "وكل سنة وأنتي حبيبت عمري وروحي يا احلى بشر بحياتي .)"
    ];

    // Character Reveal Timing per line
    const charDelay = 0.05; // 50ms per character
    const lineStartDelays = [7.5, 9, 10.5]; // in seconds

    // Add dust particles
    const dustContainer = document.getElementById('dustContainer');
    for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.classList.add('dust-particle');
        particle.style.top = Math.random() * 100 + '%';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 15 + 's';
        dustContainer.appendChild(particle);
    }

    // Function to add individual span characters to lines and start animation
    function revealCharacters() {
        for (let l = 0; l < 3; l++) {
            const lineElement = document.getElementById(`line${l+1}`);
            const text = textLines[l];
            let content = '';
            for (let c = 0; c < text.length; c++) {
                const char = text[c];
                if (char === ' ') {
                    content += '<span style="white-space: pre"> </span>';
                } else {
                    content += `<span style="--char-delay: ${l === 0 ? c * charDelay : textLines[l-1].length * charDelay + c * charDelay}s">${char}</span>`;
                }
            }
            lineElement.innerHTML = content;
            lineElement.style.animationDelay = `${lineStartDelays[l]}s`;
        }
    }

    // Start character reveal after full initial animation sequence
    revealCharacters();

</script>

</body>
</html>

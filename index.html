<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilya | Ultra Premium Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* تدرج لوني فخم جداً في الخلفية يجمع بين الأسود والأحمر والوردي العميق */
            background: radial-gradient(circle at 50% 50%, #1a000a 0%, #050002 60%, #000000 100%);
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        #webgl-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            mix-blend-mode: screen; /* لدمج إضاءة النيون مع الخلفية */
        }

        .ui-layer {
            position: relative;
            z-index: 2;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
        }

        /* حاوية الفيديو المحسنة - زجاجية ونيون */
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            border-radius: 24px;
            overflow: hidden;
            /* توهج نيون أحمر ووردي */
            box-shadow: 0 0 40px rgba(255, 0, 85, 0.4), 
                        0 0 100px rgba(255, 20, 147, 0.2), 
                        inset 0 0 20px rgba(255, 105, 180, 0.2);
            border: 1px solid rgba(255, 50, 100, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            pointer-events: auto;
            opacity: 0;
            transform: translateY(30px) scale(0.95); /* حركة دخول أفخم */
            cursor: pointer; /* إشارة للمستخدم بإمكانية النقر */
        }

        .main-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 24px;
            transition: transform 0.5s ease;
        }

        .video-wrapper:hover .main-video {
            transform: scale(1.02); /* تأثير بطيء عند تمرير الماوس */
        }

        /* زر تشغيل الصوت الأنيق */
        .audio-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 20, 147, 0.5);
            color: #ff69b4;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 14px;
            backdrop-filter: blur(10px);
            pointer-events: none;
            transition: opacity 0.5s ease;
            letter-spacing: 1px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <div class="ui-layer">
        <div class="video-wrapper" id="videoContainer">
            <video id="myVideo" src="video.mp4" class="main-video" autoplay loop muted playsinline></video>
            <div class="audio-hint" id="audioHint">انقر في أي مكان لتشغيل الصوت 🔊</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // --- 1. إعداد الصوت والفيديو ---
        const video = document.getElementById('myVideo');
        const videoContainer = document.getElementById('videoContainer');
        const audioHint = document.getElementById('audioHint');
        let isMuted = true;

        // تفعيل الصوت بضغطة واحدة (تجاوز حماية المتصفحات بشكل أنيق)
        document.body.addEventListener('click', () => {
            if (isMuted) {
                video.muted = false;
                isMuted = false;
                audioHint.style.opacity = '0'; // إخفاء التلميح
                
                // التأكد من تشغيل الفيديو إذا كان متوقفاً
                video.play().catch(e => console.log("Video play error:", e));
            }
        });

        // --- 2. إعداد بيئة Three.js بأعلى أداء ---
        const canvas = document.getElementById('webgl-canvas');
        const scene = new THREE.Scene();
        // ضباب خفيف لدمج الجزيئات البعيدة
        scene.fog = new THREE.FogExp2(0x050005, 0.04); 

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 12;

        const renderer = new THREE.WebGLRenderer({ 
            canvas: canvas, 
            antialias: true, 
            alpha: true,
            powerPreference: "high-performance" // إجبار الجهاز على أعلى أداء لمنع التقطيع
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // --- 3. تصميم الجزيئات (النيون) برمجياً ---
        // استخدام دائرة ناعمة متوهجة تعطي شكل بتلات طاقة/نيون عند الحركة
        function createGlowingTexture() {
            const size = 128;
            const canvasObj = document.createElement('canvas');
            canvasObj.width = size;
            canvasObj.height = size;
            const context = canvasObj.getContext('2d');
            
            const center = size / 2;
            const gradient = context.createRadialGradient(center, center, 0, center, center, center);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)'); // قلب أبيض ساطع
            gradient.addColorStop(0.2, 'rgba(255, 50, 100, 0.8)'); // أحمر نيون
            gradient.addColorStop(0.5, 'rgba(255, 20, 147, 0.4)'); // وردي نيون
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            context.fillStyle = gradient;
            context.beginPath();
            context.arc(center, center, center, 0, Math.PI * 2);
            context.fill();
            
            const texture = new THREE.Texture(canvasObj);
            texture.needsUpdate = true;
            return texture;
        }
        
        const particleTexture = createGlowingTexture();

        // --- 4. نظام الكيانات المضيئة (الأزهار/الطاقة) ---
        const particleCount = 200; // تم تقليل الحجم وزيادة العدد
        const particleGeo = new THREE.BufferGeometry();
        const particlePosArray = new Float32Array(particleCount * 3);
        const particleData = []; 

        for(let i = 0; i < particleCount; i++) {
            particlePosArray[i*3] = (Math.random() - 0.5) * 35;
            particlePosArray[i*3+1] = (Math.random() - 0.5) * 20 - 10;
            particlePosArray[i*3+2] = (Math.random() - 0.5) * 10;

            particleData.push({
                speed: Math.random() * 0.02 + 0.015,
                angle: Math.random() * Math.PI * 2,
                radius: Math.random() * 0.05,
                wobbleSpeed: Math.random() * 0.05
            });
        }

        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePosArray, 3));

        const particleMaterial = new THREE.PointsMaterial({
            size: 0.8, // حجم أصغر ودقيق
            map: particleTexture,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending // تأثير النيون المتوهج
        });

        const particleMesh = new THREE.Points(particleGeo, particleMaterial);
        scene.add(particleMesh);

        // --- 5. نظام ذيل السراب (الدخان الواقعي) ---
        const maxSmoke = 12000; // عدد كبير جداً لكن محسّن برمجياً
        let smokeIdx = 0;
        const smokeGeo = new THREE.BufferGeometry();
        const smokePosArray = new Float32Array(maxSmoke * 3);
        const smokeAgeArray = new Float32Array(maxSmoke);

        smokeGeo.setAttribute('position', new THREE.BufferAttribute(smokePosArray, 3));
        smokeGeo.setAttribute('age', new THREE.BufferAttribute(smokeAgeArray, 1));

        // Shader متقدم لمعالجة الدخان على كرت الشاشة (يمنع التقطيع تماماً)
        const smokeMaterial = new THREE.ShaderMaterial({
            uniforms: {
                tex: { value: particleTexture },
                color1: { value: new THREE.Color(0xff0033) }, // أحمر نيون
                color2: { value: new THREE.Color(0xff1493) }  // وردي نيون
            },
            vertexShader: `
                attribute float age;
                varying float vAge;
                void main() {
                    vAge = age;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    // الذيل يبدأ صغيراً ويكبر تدريجياً ثم يختفي
                    float size = 15.0 * (1.0 - age) * (15.0 / -mvPosition.z);
                    gl_PointSize = size;
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform sampler2D tex;
                uniform vec3 color1;
                uniform vec3 color2;
                varying float vAge;
                void main() {
                    if (vAge <= 0.0) discard;
                    vec4 texColor = texture2D(tex, gl_PointCoord);
                    // دمج اللونين الأحمر والوردي بناءً على عمر الدخان
                    vec3 finalColor = mix(color1, color2, vAge);
                    gl_FragColor = vec4(finalColor, texColor.a * vAge * 0.5); // شفافية ناعمة
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const smokeMesh = new THREE.Points(smokeGeo, smokeMaterial);
        scene.add(smokeMesh);

        // --- 6. حركة الماوس السلسة (Damping) ---
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX) * 0.0005;
            mouseY = (event.clientY - windowHalfY) * 0.0005;
        });

        // --- 7. محرك التصيير والفيزياء (Animation Loop) ---
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            // تحديث حركة الجزيئات (حركة انسيابية متعرجة مثل الهواء)
            for(let i = 0; i < particleCount; i++) {
                let d = particleData[i];
                
                // حركة ديناميكية معقدة وسلسة
                d.angle += d.wobbleSpeed;
                particlePosArray[i*3] += Math.sin(d.angle) * d.radius;
                particlePosArray[i*3+1] += d.speed; // الارتفاع للأعلى
                particlePosArray[i*3+2] += Math.cos(d.angle) * d.radius;

                // إعادة تدوير الجزيء من الأسفل بشكل سلس
                if(particlePosArray[i*3+1] > 12) {
                    particlePosArray[i*3+1] = -12;
                    particlePosArray[i*3] = (Math.random() - 0.5) * 35;
                }

                // إصدار ذيل السراب (يتبع الجزيء الأساسي)
                smokePosArray[smokeIdx*3] = particlePosArray[i*3];
                smokePosArray[smokeIdx*3+1] = particlePosArray[i*3+1] - 0.1;
                smokePosArray[smokeIdx*3+2] = particlePosArray[i*3+2];
                smokeAgeArray[smokeIdx] = 1.0; 
                
                smokeIdx = (smokeIdx + 1) % maxSmoke;
            }
            particleGeo.attributes.position.needsUpdate = true;

            // تحديث ذيل السراب (يتلاشى ويتحرك بعكس الاتجاه قليلاً)
            for(let i = 0; i < maxSmoke; i++) {
                if(smokeAgeArray[i] > 0) {
                    smokeAgeArray[i] -= 0.012; // سرعة التلاشي
                    smokePosArray[i*3] += Math.sin(time + i) * 0.005; // تشتت دخاني طبيعي
                }
            }
            smokeGeo.attributes.position.needsUpdate = true;
            smokeGeo.attributes.age.needsUpdate = true;

            // حركة الكاميرا بنعومة (Lerp)
            targetX += (mouseX - targetX) * 0.05;
            targetY += (mouseY - targetY) * 0.05;
            camera.position.x += (mouseX * 5 - camera.position.x) * 0.02;
            camera.position.y += (-mouseY * 5 - camera.position.y) * 0.02;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }
        animate();

        // --- 8. دخول احترافي للفيديو (GSAP) ---
        gsap.to(".video-wrapper", {
            duration: 2,
            y: 0,
            scale: 1,
            opacity: 1,
            ease: "expo.out", // حركة فخمة وسريعة في البداية ثم تتباطأ
            delay: 0.3
        });

        // --- 9. التجاوب مع جميع الشاشات ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

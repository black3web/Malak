<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jalal | Ultimate WebGL Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0; padding: 0;
            overflow: hidden;
            background-color: #030000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
        }
        
        #webgl-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
        }

        .ui-layer {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            padding: 20px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 950px;
            aspect-ratio: 16 / 9;
            border-radius: 30px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 40px 100px -20px rgba(255, 0, 60, 0.3);
            pointer-events: auto;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .video-wrapper:hover {
            transform: scale(1.02);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <div class="ui-layer">
        <div class="video-wrapper">
            <video src="video.mp4" autoplay loop muted playsinline></video>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const canvas = document.getElementById('webgl-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ 
            canvas: canvas, 
            antialias: true,
            preserveDrawingBuffer: true 
        });
        renderer.autoClearColor = false;
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // --- إنشاء زهرة لوتس فائقة الجودة برمجياً ---
        function createUltraLotusTexture() {
            const size = 512;
            const canvas2d = document.createElement('canvas');
            canvas2d.width = size; canvas2d.height = size;
            const ctx = canvas2d.getContext('2d');
            
            // تدرج لوني مركزي فائق الجمال
            const radGrad = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/4);
            radGrad.addColorStop(0, '#ffffff');
            radGrad.addColorStop(0.5, '#ff4d79');
            radGrad.addColorStop(1, 'transparent');

            // رسم البتلات بدقة مجهرية
            for(let i = 0; i < 16; i++) {
                ctx.save();
                ctx.translate(size/2, size/2);
                ctx.rotate((Math.PI * 2 / 16) * i);
                
                const petalGrad = ctx.createLinearGradient(0, 0, 0, -150);
                petalGrad.addColorStop(0, 'rgba(255, 0, 60, 0.1)');
                petalGrad.addColorStop(0.7, 'rgba(255, 100, 150, 0.8)');
                petalGrad.addColorStop(1, 'rgba(255, 255, 255, 0.9)');

                ctx.fillStyle = petalGrad;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(30, -70, 0, -160);
                ctx.quadraticCurveTo(-30, -70, 0, 0);
                ctx.fill();
                ctx.restore();
            }

            ctx.fillStyle = radGrad;
            ctx.beginPath();
            ctx.arc(size/2, size/2, 40, 0, Math.PI*2);
            ctx.fill();

            return new THREE.CanvasTexture(canvas2d);
        }

        const lotusTexture = createUltraLotusTexture();

        // --- نظام الجسيمات المتقدم ---
        const count = 120;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        const seeds = new Float32Array(count);

        for(let i = 0; i < count; i++) {
            positions[i*3] = (Math.random() - 0.5) * 30;
            positions[i*3+1] = (Math.random() - 0.5) * 30;
            positions[i*3+2] = (Math.random() - 0.5) * 20;
            seeds[i] = Math.random() * 100;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        const material = new THREE.PointsMaterial({
            size: 1.2,
            map: lotusTexture,
            transparent: true,
            opacity: 0.85,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const points = new THREE.Points(geometry, material);
        scene.add(points);

        camera.position.z = 12;

        // --- طبقة الدخان المرن ---
        const fadeMaterial = new THREE.MeshBasicMaterial({
            color: 0x030000,
            transparent: true,
            opacity: 0.12 // تحكم بطول الذيل من هنا
        });
        const fadePlane = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), fadeMaterial);
        fadePlane.position.z = -2;
        camera.add(fadePlane);
        scene.add(camera);

        // --- التفاعل والتحكم ---
        let targetX = 0, targetY = 0;
        let isClicking = false;

        window.addEventListener('mousemove', (e) => {
            targetX = (e.clientX - window.innerWidth/2) * 0.001;
            targetY = (e.clientY - window.innerHeight/2) * 0.001;
        });

        // تحريك الخلفية بالكامل عند الضغط
        window.addEventListener('mousedown', () => {
            isClicking = true;
            gsap.to(camera.position, { z: 8, duration: 1.5, ease: "expo.out" });
            gsap.to(points.rotation, { z: "+=0.5", duration: 2, ease: "power4.out" });
        });

        window.addEventListener('mouseup', () => {
            isClicking = false;
            gsap.to(camera.position, { z: 12, duration: 2, ease: "elastic.out(1, 0.3)" });
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // حركة فيزيائية ناعمة للأزهار
            const pos = points.geometry.attributes.position.array;
            for(let i = 0; i < count; i++) {
                const i3 = i * 3;
                pos[i3] += Math.sin(time + i) * 0.005;
                pos[i3+1] += Math.cos(time + i) * 0.008;
            }
            points.geometry.attributes.position.needsUpdate = true;

            // دوران الخلفية
            points.rotation.y += 0.002;

            // تفاعل الكاميرا مع الماوس (انزياح كلي)
            camera.position.x += (targetX * 5 - camera.position.x) * 0.05;
            camera.position.y += (-targetY * 5 - camera.position.y) * 0.05;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
